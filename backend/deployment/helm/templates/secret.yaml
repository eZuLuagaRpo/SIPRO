# Secret del release para credenciales basicas del datasource.
# Los valores reales deben venir de la herramienta corporativa o del pipeline, no quedar hardcodeados.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secret
type: Opaque
stringData:
  DB_USER: {{ .Values.env.DB_USER | quote }}
  DB_PASS: {{ .Values.env.DB_PASS | quote }}
  # Credenciales de S3 — igual de sensibles que las de la base de datos.
  APP_STORAGE_S3_ACCESS_KEY: {{ .Values.env.APP_STORAGE_S3_ACCESS_KEY | quote }}
  APP_STORAGE_S3_SECRET_KEY: {{ .Values.env.APP_STORAGE_S3_SECRET_KEY | quote }}
  # Contrasena del correo — igual de sensible que las credenciales de la base de datos.
  MAIL_PASSWORD: {{ .Values.env.MAIL_PASSWORD | quote }}