# Deployment minimo del validation-service.
# Centraliza imagen, replicas y el mapeo entre values.yaml, ConfigMap y Secret.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      containers:
        - name: validation-service
          # La imagen se resuelve desde values para permitir promotion por ambiente sin tocar la plantilla.
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            # Spring Boot escucha en 8080 dentro del contenedor.
            - containerPort: 8080
          env:
            - name: SERVER_PORT
              value: {{ .Values.env.SERVER_PORT | quote }}
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-config
                  key: SPRING_PROFILES_ACTIVE
            - name: JDBC_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-config
                  key: JDBC_URL
            - name: AD_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-config
                  key: AD_URL
            - name: AD_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-config
                  key: AD_DOMAIN
            - name: APP_CORS_ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-config
                  key: APP_CORS_ALLOWED_ORIGINS
            - name: APP_STORAGE_S3_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-config
                  key: APP_STORAGE_S3_ENDPOINT
            - name: APP_STORAGE_S3_REGION
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-config
                  key: APP_STORAGE_S3_REGION
            - name: APP_STORAGE_S3_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-config
                  key: APP_STORAGE_S3_BUCKET
            - name: APP_MAIL_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-config
                  key: APP_MAIL_ENABLED
            - name: APP_MAIL_TRANSPORT
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-config
                  key: APP_MAIL_TRANSPORT
            - name: APP_MAIL_FROM
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-config
                  key: APP_MAIL_FROM
            - name: APP_MAIL_ACTION_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-config
                  key: APP_MAIL_ACTION_URL
            - name: APP_MAIL_BANNER_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-config
                  key: APP_MAIL_BANNER_URL
            - name: MAIL_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-config
                  key: MAIL_HOST
            - name: MAIL_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-config
                  key: MAIL_PORT
            - name: MAIL_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-config
                  key: MAIL_USERNAME
            - name: DB_USER
              # Las credenciales se leen desde Secret para no exponerlas en ConfigMap.
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secret
                  key: DB_USER
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secret
                  key: DB_PASS
            - name: APP_STORAGE_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secret
                  key: APP_STORAGE_S3_ACCESS_KEY
            - name: APP_STORAGE_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secret
                  key: APP_STORAGE_S3_SECRET_KEY
            - name: MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secret
                  key: MAIL_PASSWORD